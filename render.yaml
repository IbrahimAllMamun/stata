# render.yaml (place in repo root)
services:
  - type: web
    name: stata-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stata-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://stata-frontend.onrender.com  # update after frontend deploys

databases:
  - name: stata-db
    plan: free